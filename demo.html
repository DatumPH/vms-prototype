<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vendor Management - Walkthrough</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --canvas:       #0b0d10;
      --canvas-deep:  #08090b;
      --canvas-soft:  #0a0c0f;
      --rule:         rgba(255,255,255,.05);
      --rule-strong:  rgba(255,255,255,.08);
      --text:         #e6e8eb;
      --text-mute:    #9a9ea3;
      --text-faint:   #5d6166;
      --text-strong:  #ffffff;
      --brand:        #EC1B2E;
      --brand-tint:   rgba(236,27,46,.09);
      --brand-soft:   rgba(236,27,46,.05);
      --ok:           #34d399;
      --warn:         #fbbf24;
      --bad:          #f87171;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      background: var(--canvas);
      color: var(--text);
      font: 13.5px/1.5 'IBM Plex Sans', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .mono {
      font-family: 'IBM Plex Mono', ui-monospace, monospace;
      font-feature-settings: "tnum", "zero";
    }

    code, kbd {
      font-family: 'IBM Plex Mono', ui-monospace, monospace;
      font-feature-settings: "tnum", "zero";
      font-size: 0.92em;
    }

    kbd {
      background: var(--canvas-deep);
      border: 1px solid var(--rule-strong);
      border-radius: 3px;
      padding: 1px 5px;
      color: var(--text-mute);
    }

    button {
      font: inherit;
      background: transparent;
      border: 1px solid var(--rule-strong);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: var(--rule); }
    button.primary { background: var(--brand); border-color: var(--brand); color: #fff; }
    button.primary:hover { background: #d31729; }

    #root { min-height: 100vh; }
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 2.5px 8px; border-radius: 3px;
      font: 500 10.5px 'IBM Plex Mono', monospace;
      letter-spacing: .04em;
      font-feature-settings: "tnum","zero";
    }
    .pill::before { content: ""; width: 5px; height: 5px; border-radius: 50%; }
    .pill.ok   { background: rgba(52,211,153,.10);  color: var(--ok);   } .pill.ok::before   { background: var(--ok); }
    .pill.warn { background: rgba(251,191,36,.10);  color: var(--warn); } .pill.warn::before { background: var(--warn); }
    .pill.bad  { background: rgba(248,113,113,.10); color: var(--bad);  } .pill.bad::before  { background: var(--bad); }
    .pill.live { background: var(--brand-tint);     color: var(--brand);} .pill.live::before { background: var(--brand); box-shadow: 0 0 6px var(--brand); }
    .kpi { background: var(--canvas); padding: 13px 16px; }
    .kpi .kpi-label { font: 500 10.5px 'IBM Plex Mono', monospace; letter-spacing: .14em; color: var(--text-faint); text-transform: uppercase; font-feature-settings: "tnum"; }
    .kpi .kpi-val   { font: 600 24px 'IBM Plex Mono', monospace; margin-top: 4px; color: var(--text-strong); font-feature-settings: "tnum","zero"; letter-spacing: -.005em; }
    .kpi .kpi-delta { font: 500 11.5px 'IBM Plex Mono', monospace; margin-top: 2px; font-feature-settings: "tnum"; }
    .kpi .kpi-delta.ok   { color: var(--ok); }
    .kpi .kpi-delta.bad  { color: var(--bad); }
    .kpi .kpi-delta.acc  { color: var(--brand); }
    .kpi .kpi-delta.mute { color: var(--text-faint); }

    .kpi-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--rule); border-bottom: 1px solid var(--rule); }
    table.dt { width: 100%; border-collapse: collapse; font: 13px 'IBM Plex Sans', sans-serif; }
    table.dt th { text-align: left; font: 500 10.5px 'IBM Plex Mono', monospace; letter-spacing: .12em; color: var(--text-faint); text-transform: uppercase; padding: 7px 8px; border-bottom: 1px solid var(--rule-strong); font-feature-settings: "tnum"; }
    table.dt th.r, table.dt td.r { text-align: right; }
    table.dt td { padding: 9px 8px; border-bottom: 1px solid var(--rule); }
    table.dt td.mono { font-family: 'IBM Plex Mono', monospace; font-feature-settings: "tnum","zero"; color: var(--text); }
    table.dt td.mono.muted { color: var(--text-mute); font-size: 12px; }
    table.dt tbody tr { cursor: pointer; }
    table.dt tbody tr:hover td { background: var(--brand-soft); }
    table.dt tbody tr.selected td { background: var(--brand-tint); }
    .chain { display: flex; gap: 0; font: 500 10.5px 'IBM Plex Mono', monospace; font-feature-settings: "tnum"; }
    .chain .step { flex: 1; padding: 7px 4px; text-align: center; border-right: 1px solid var(--rule); color: var(--text-faint); position: relative; }
    .chain .step:last-child { border-right: 0; }
    .chain .step.done { color: var(--ok); }
    .chain .step.cur  { color: var(--brand); background: var(--brand-soft); }
    .chain .step.rej  { color: var(--bad); background: rgba(248,113,113,.05); }
    .chain .step .lbl { letter-spacing: .08em; }
    .chain .step .ck  { font-size: 12px; margin-top: 3px; }
    .chain .step .who { font-size: 9px; opacity: 0.8; margin-top: 2px; }
    .drawer-backdrop {
      position: fixed; inset: 0;
      background: rgba(8,9,11,.55);
      backdrop-filter: blur(2px);
      z-index: 40;
      display: flex; justify-content: flex-end;
    }
    .drawer-panel {
      width: min(520px, 92vw);
      height: 100vh;
      background: var(--canvas-deep);
      border-left: 1px solid var(--rule-strong);
      display: flex; flex-direction: column;
      animation: drawer-in 180ms ease-out;
    }
    @keyframes drawer-in { from { transform: translateX(40px); opacity: 0 } to { transform: translateX(0); opacity: 1 } }
    .drawer-head {
      display: flex; align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--rule);
    }
    .drawer-title { font: 600 13px 'IBM Plex Sans', sans-serif; letter-spacing: .04em; }
    .drawer-mode  { margin-left: 8px; font: 500 10.5px 'IBM Plex Mono', monospace; color: var(--text-faint); letter-spacing: .12em; text-transform: uppercase; }
    .drawer-close { margin-left: auto; }
    .drawer-body  { flex: 1; overflow-y: auto; padding: 16px; }
    .bb-side { width: 212px; background: var(--canvas-deep); border-right: 1px solid var(--rule); padding: 14px 0; }
    .bb-brand { display: flex; align-items: center; gap: 10px; padding: 0 16px 16px; border-bottom: 1px solid var(--rule); }
    .bb-brand .mark { width: 28px; height: 28px; background: var(--brand); color: #fff; display: flex; align-items: center; justify-content: center; border-radius: 5px; font: 700 11px 'IBM Plex Sans', sans-serif; letter-spacing: .04em; }
    .bb-brand .name { font: 600 12.5px 'IBM Plex Sans', sans-serif; letter-spacing: .05em; text-transform: uppercase; color: var(--text-mute); }
    .bb-brand .name b { color: var(--text-strong); font-weight: 600; }
    .bb-nav { padding: 14px 8px 0; display: flex; flex-direction: column; gap: 1px; }
    .bb-nav .item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 5px; color: var(--text-mute); font: 500 12.5px 'IBM Plex Sans', sans-serif; cursor: pointer; position: relative; }
    .bb-nav .item:hover { background: rgba(255,255,255,.02); }
    .bb-nav .item .k { font: 500 10.5px 'IBM Plex Mono', monospace; color: var(--text-faint); margin-left: auto; padding: 1.5px 5px; border: 1px solid var(--rule-strong); border-radius: 3px; font-feature-settings: "tnum"; }
    .bb-nav .item.active { background: var(--brand-tint); color: var(--text-strong); }
    .bb-nav .item.active::before { content: ""; position: absolute; left: -8px; top: 7px; bottom: 7px; width: 2px; background: var(--brand); border-radius: 0 2px 2px 0; }
    .bb-nav .group { padding: 14px 12px 6px; font: 500 10.5px 'IBM Plex Mono', monospace; letter-spacing: .14em; color: var(--text-faint); text-transform: uppercase; }
    .bb-top { display: flex; align-items: center; padding: 23px 18px; border-bottom: 1px solid var(--rule); gap: 14px; background: var(--canvas-soft); }
    .bb-top .crumbs { font: 500 12.5px 'IBM Plex Sans', sans-serif; color: var(--text-mute); }
    .bb-top .crumbs b { color: var(--text-strong); font-weight: 600; }
    .bb-top .ticker { margin-left: auto; display: flex; gap: 20px; }
    .bb-top .ticker .t { font: 500 11.5px 'IBM Plex Mono', monospace; color: var(--text-mute); font-feature-settings: "tnum","zero"; }
    .bb-top .ticker .t b { color: var(--text-strong); margin-left: 6px; font-weight: 600; }
    .bb-top .ticker .t .up { color: var(--ok); }
    .bb-top .ticker .t .dn { color: var(--bad); }

    .bb-cmd { display: flex; align-items: center; padding: 8px 14px; background: var(--canvas-deep); border-top: 1px solid var(--rule); font: 500 10.5px 'IBM Plex Mono', monospace; color: var(--text-faint); gap: 18px; letter-spacing: .06em; font-feature-settings: "tnum"; }
    .bb-cmd b { color: var(--brand); margin-right: 6px; font-weight: 500; }
    .bb-cmd .right { margin-left: auto; }
    .bb-shell { display: flex; min-height: 100vh; }
    .bb-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .bb-screen { flex: 1; min-height: 0; overflow: auto; }
    .placeholder-screen { padding: 40px; color: var(--text-faint); font: 500 13px 'IBM Plex Sans', sans-serif; }
    .screen-body { display: grid; grid-template-columns: 1.6fr 1fr; gap: 1px; background: var(--rule); }
    .bb-panel { background: var(--canvas); padding: 14px 16px; min-width: 0; }
    .bb-panel .head { display: flex; align-items: center; margin-bottom: 10px; }
    .bb-panel .head h4 { margin: 0; font: 600 12.5px 'IBM Plex Sans', sans-serif; letter-spacing: .05em; text-transform: uppercase; color: var(--text-mute); }
    .bb-panel .head .meta { margin-left: auto; font: 500 10.5px 'IBM Plex Mono', monospace; color: var(--text-faint); font-feature-settings: "tnum"; }
    .activity .row { font: 500 11.5px 'IBM Plex Mono', monospace; padding: 4px 0; color: var(--text-mute); font-feature-settings: "tnum"; }
    .activity .row .time { color: var(--text-faint); margin-right: 8px; }
    .activity .row .APR { color: var(--ok); margin-right: 8px; }
    .activity .row .SUB { color: var(--warn); margin-right: 8px; }
    .activity .row .REJ { color: var(--bad); margin-right: 8px; }
    .activity .row .PAY { color: var(--brand); margin-right: 8px; }
    .contract-notes { display: flex; flex-direction: column; gap: 10px; }
    .contract-notes .note { background: var(--canvas); border: 1px solid var(--rule); border-radius: 6px; padding: 10px; }
    .contract-notes .note .meta { font: 500 10.5px 'IBM Plex Mono', monospace; color: var(--text-faint); margin-bottom: 4px; letter-spacing: .04em; }
    .contract-notes .note .meta b { color: var(--text); }
    .contract-notes .note .body { font: 13px 'IBM Plex Sans', sans-serif; color: var(--text); }
    .form-grid { display: grid; grid-template-columns: 160px 1fr; gap: 10px 14px; align-items: center; }
    .form-grid label { font: 500 10.5px 'IBM Plex Mono', monospace; letter-spacing: .12em; color: var(--text-faint); text-transform: uppercase; }
    .form-grid input, .form-grid select, .form-grid textarea {
      font: 13px 'IBM Plex Sans', sans-serif;
      background: var(--canvas-deep);
      color: var(--text);
      border: 1px solid var(--rule-strong);
      border-radius: 4px;
      padding: 7px 10px;
      width: 100%;
    }
    .form-grid textarea { min-height: 64px; resize: vertical; }
    .form-actions { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }
    .tracker-actions { padding: 10px 16px; border-top: 1px solid var(--rule); display: flex; gap: 10px; align-items: center; background: var(--canvas-soft); }
    .tracker-actions .meta { font: 500 11.5px 'IBM Plex Mono', monospace; color: var(--text-mute); margin-right: auto; }
    .role-select { background: transparent; color: var(--text); border: 1px solid var(--rule-strong); border-radius: 3px; padding: 3px 6px; font: 500 11px 'IBM Plex Mono', monospace; }
    .role-select.edit { color: var(--ok); }
    .role-select.read { color: var(--warn); }
    .role-select.no   { color: var(--bad); }

    .tour-backdrop {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 100;
    }
    .tour-backdrop svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .tour-spotlight-ring {
      position: fixed;
      border: 1px solid var(--brand);
      border-radius: 6px;
      box-shadow: 0 0 0 1px rgba(236,27,46,.3), 0 0 24px rgba(236,27,46,.25);
      pointer-events: none;
      z-index: 101;
      transition: top 200ms ease, left 200ms ease, width 200ms ease, height 200ms ease;
    }
    .tour-tooltip {
      position: fixed;
      width: 320px;
      background: var(--canvas-deep);
      border: 1px solid var(--rule-strong);
      border-radius: 6px;
      padding: 14px 16px;
      z-index: 102;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      transition: top 200ms ease, left 200ms ease;
    }
    .tour-tooltip .label { font: 500 10.5px 'IBM Plex Mono', monospace; color: var(--text-faint); letter-spacing: .12em; text-transform: uppercase; }
    .tour-tooltip h5 { margin: 4px 0 6px; font: 600 14px 'IBM Plex Sans', sans-serif; color: var(--text-strong); }
    .tour-tooltip p { margin: 0 0 12px; font: 13px/1.5 'IBM Plex Sans', sans-serif; color: var(--text); }
    .tour-tooltip .actions { display: flex; gap: 8px; align-items: center; }
    .tour-tooltip .actions .skip { margin-right: 5px; font: 500 11.5px 'IBM Plex Mono', monospace; color: var(--text-faint); background: transparent; border: 0; cursor: pointer; }
    .tour-tooltip .actions button { font: 500 12.5px 'IBM Plex Sans', sans-serif; }

    .tour-chapter-strip {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: center; gap: 0;
      background: var(--canvas-deep);
      border-bottom: 1px solid var(--rule);
      z-index: 102;
      padding: 8px 16px;
    }
    .tour-chapter-strip .ch {
      font: 500 11px 'IBM Plex Mono', monospace;
      color: var(--text-faint);
      padding: 4px 10px;
      letter-spacing: .04em;
      cursor: pointer;
      border-right: 1px solid var(--rule);
    }
    .tour-chapter-strip .ch:last-child { border-right: 0; }
    .tour-chapter-strip .ch.active { color: var(--brand); }

    .tour-center-card {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 420px;
      background: var(--canvas-deep);
      border: 1px solid var(--rule-strong);
      border-radius: 8px;
      padding: 24px 28px;
      z-index: 102;
      text-align: center;
    }
  </style>
</head>

    // ============ STATE ============
    const initialAppState = {
      activeModule: 'VendorOnboarding',
      selectedRow: null,           // { module, id } | null
      drawer: { open:false, mode:null, rowId:null }, // mode: 'new'|'edit'|'view'|'notes'
      trackerStage: null,          // ApprovalStage | null
      rfpOverrides: {},            // { [rfpId]: { currentStage, stageHistory } }
    };

    function appReducer(state, action) {
      switch (action.type) {
        case 'SET_MODULE':
          return { ...state, activeModule: action.module, selectedRow: null, drawer: { open:false, mode:null, rowId:null }, trackerStage: action.module === 'RfpTracker' ? state.trackerStage : null };
        case 'SELECT_ROW':
          return { ...state, selectedRow: { module: action.module, id: action.id } };
        case 'OPEN_DRAWER':
          return { ...state, drawer: { open:true, mode: action.mode, rowId: action.rowId } };
        case 'CLOSE_DRAWER':
          return { ...state, drawer: { open:false, mode:null, rowId:null } };
        case 'SET_TRACKER_STAGE':
          return { ...state, trackerStage: action.stage };
        case 'ADVANCE_RFP': {
          const current = state.rfpOverrides[action.rfpId] || mergeRfp(action.rfpId);
          const nextStage = nextApprovalStage(current.currentStage);
          const newHistory = [...current.stageHistory, { stage: current.currentStage, approver: APPROVERS[current.currentStage], action: 'approve', at: action.at, remarks: action.remarks || '' }];
          return { ...state, rfpOverrides: { ...state.rfpOverrides, [action.rfpId]: { currentStage: nextStage, stageHistory: newHistory } } };
        }
        case 'REJECT_RFP': {
          const current = state.rfpOverrides[action.rfpId] || mergeRfp(action.rfpId);
          const newHistory = [...current.stageHistory, { stage: current.currentStage, approver: APPROVERS[current.currentStage], action: 'reject', at: action.at, remarks: action.remarks || '' }];
          return { ...state, rfpOverrides: { ...state.rfpOverrides, [action.rfpId]: { currentStage: 'REJECTED', stageHistory: newHistory } } };
        }
        case 'INSERT_RFP':
          return { ...state, rfpOverrides: { ...state.rfpOverrides, [action.rfp.id]: { currentStage: 'ITFA', stageHistory: [], _inserted: action.rfp } }, activeModule: 'RfpTracker' };
        case 'RESET':
          return initialAppState;
        default:
          return state;
      }
    }

    function mergeRfp(rfpId) {
      const base = RFPS.find(r => r.id === rfpId);
      return { currentStage: base.currentStage, stageHistory: base.stageHistory };
    }

    function getRfp(rfpId, overrides) {
      const base = RFPS.find(r => r.id === rfpId);
      const ov = overrides[rfpId];
      if (base && ov) return { ...base, currentStage: ov.currentStage, stageHistory: ov.stageHistory };
      if (!base && ov && ov._inserted) return { ...ov._inserted, currentStage: ov.currentStage, stageHistory: ov.stageHistory };
      return base;
    }

    function allRfps(overrides) {
      const inserted = Object.entries(overrides).filter(([id]) => !RFPS.find(r => r.id === id)).map(([id, ov]) => ({ ...ov._inserted, currentStage: ov.currentStage, stageHistory: ov.stageHistory }));
      const existing = RFPS.map(r => {
        const ov = overrides[r.id];
        return ov ? { ...r, currentStage: ov.currentStage, stageHistory: ov.stageHistory } : r;
      });
      return [...inserted, ...existing];
    }

    function nextApprovalStage(stage) {
      const idx = STAGE_ORDER.indexOf(stage);
      if (idx === -1) return stage;
      if (idx === STAGE_ORDER.length - 1) return 'FOR_PAYMENT';
      return STAGE_ORDER[idx + 1];

              </div>
            </div>
            <${DataTable} columns=${cols} rows=${filtered} onRowClick=${(r) => dispatch({ type:'SELECT_ROW', module:'RfpTracker', id:r.id })} selectedId=${state.selectedRow?.module === 'RfpTracker' ? state.selectedRow.id : null} />
          </section>

          ${selected ? html`
            <div class="tracker-actions" data-tour="approve-reject">
              <div class="meta"><b>${selected.id}</b> · ${selected.title} · ${formatPHP(selected.amountPHP)} · stage ${selected.currentStage}</div>
              ${TERMINAL_STAGES.includes(selected.currentStage)
                ? html`<span class="mono" style=${{ color:'var(--text-mute)' }}>terminal - no actions</span>`
                : html`
                    <button onClick=${() => dispatch({ type:'REJECT_RFP', rfpId: selected.id, at: '2026-06-13', remarks: 'Rejected via demo.' })}>Reject</button>
                    <button class="primary" onClick=${() => dispatch({ type:'ADVANCE_RFP', rfpId: selected.id, at: '2026-06-13' })}>Approve →</button>
                  `}
            </div>
          ` : null}
        </div>
      `;
    };
    const PAYMENT_STATUS_PILL = {
      pending_tag: { v:'warn', label:'pending tag' },
      tagged:      { v:'ok',   label:'tagged' },
      rejected:    { v:'bad',  label:'rejected' },
    };

    const PaymentTagging = ({ state, dispatch }) => {
      const cols = [
        { key:'id',        label:'Payment ID',    mono:true },
        { key:'rfpId',     label:'RFP ID',        mono:true },
        { key:'bankRef',   label:'Bank Ref',      mono:true },
        { key:'status',    label:'Status', render: (r) => {
          const s = PAYMENT_STATUS_PILL[r.status];
          return html`<${Pill} variant=${s.v}>${s.label}<//>`;
        }},
        { key:'actualAmountPaid', label:'Amount', align:'right', mono:true, render: (r) => formatPHP(r.actualAmountPaid) },
        { key:'paidAt',    label:'Paid',          align:'right', mono:true, render: (r) => r.paidAt || '-' },
      ];

      const tagged = PAYMENTS.filter(p => p.status === 'tagged');
      const pending = PAYMENTS.filter(p => p.status === 'pending_tag');

      return html`
        <div>
          <div class="kpi-strip">
            <${KpiCard} label="Pending Tag"      value=${pending.length} delta=""             deltaVariant="bad" />
            <${KpiCard} label="Tagged Today"     value=${tagged.length}  delta="rolling"      deltaVariant="ok" />
            <${KpiCard} label="Total Disbursed"  value=${formatPHP(tagged.reduce((s,p) => s + p.actualAmountPaid, 0))} delta="YTD" deltaVariant="acc" />
            <${KpiCard} label="FX Spread"        value="₱ 0.04" delta="USD/PHP" deltaVariant="mute" />
          </div>
          <div style=${{ padding:'1px 0' }}>
            <section class="bb-panel" data-tour="payment-queue">
              <div class="head"><h4>Payments</h4><div class="meta">${PAYMENTS.length} total</div></div>
              <${DataTable} columns=${cols} rows=${PAYMENTS} onRowClick=${(r) => {
                dispatch({ type:'SELECT_ROW', module:'PaymentTagging', id:r.id });
                dispatch({ type:'OPEN_DRAWER', mode:'tag', rowId:r.id });
              }} selectedId=${state.selectedRow?.module === 'PaymentTagging' ? state.selectedRow.id : null} />
            </section>
          </div>

          <${Drawer} open=${state.drawer.open && state.drawer.mode === 'tag'} title="Tag Payment" mode="tag" onClose=${() => dispatch({ type:'CLOSE_DRAWER' })}>
            <div data-tour="tag-modal">
              ${(() => {
                const p = PAYMENTS.find(x => x.id === state.drawer.rowId);
                if (!p) return null;
                return html`
                  <div class="form-grid">
                    <label>Payment ID</label>       <input class="mono" value=${p.id} disabled />
                    <label>RFP ID</label>           <input class="mono" value=${p.rfpId} disabled />
                    <label>Bank Reference</label>   <input class="mono" value=${p.bankRef} readOnly />
                    <label>Exchange Rate</label>    <input class="mono" value=${p.exchangeRateUsed} readOnly />
                    <label>Actual Amount Paid</label><input class="mono" value=${p.actualAmountPaid} readOnly />
                  </div>
                  <div class="form-actions">
                    <button onClick=${() => dispatch({ type:'CLOSE_DRAWER' })}>Cancel</button>
                    <button class="primary" onClick=${() => dispatch({ type:'CLOSE_DRAWER' })}>Save tag</button>
                  </div>
                `;
              })()}
            </div>
          <//>
        </div>
      `;
    };
    const ROLE_MODULES = ['Vendor Onboarding','Contract Management','RFP','RFP Tracker','Payment Tagging'];

    const Admin = () => {
      const cls = (v) => v === 'Edit' ? 'edit' : v === 'Read' ? 'read' : 'no';
      return html`
        <div style=${{ padding:'1px 0' }}>
          <section class="bb-panel" data-tour="role-matrix">
            <div class="head"><h4>Role Assignments</h4><div class="meta">${ROLES.length} users</div></div>
            <table class="dt">
              <thead>
                <tr>
                  <th>User</th>
                  <th>Email</th>
                  ${ROLE_MODULES.map(m => html`<th key=${m}>${m}</th>`)}
                  <th>Approver?</th>
                </tr>
              </thead>
              <tbody>
                ${ROLES.map(r => html`
                  <tr key=${r.email}>
                    <td>${r.name}</td>
                    <td class="mono muted">${r.email}</td>
                    ${ROLE_MODULES.map(m => {
                      const v = r.roles[m];
                      return html`<td key=${m}>
                        <select class=${'role-select ' + cls(v)} defaultValue=${v}>
                          <option>Edit</option><option>Read</option><option>No Access</option>
                        </select>
                      </td>`;
                    })}
                    <td><${Pill} variant=${r.isApprover ? 'ok' : 'bad'}>${r.isApprover ? 'yes' : 'no'}<//></td>
                  </tr>
                `)}
              </tbody>
            </table>
          </section>
        </div>
      `;
    };

    const SCREEN_BY_MODULE = { VendorOnboarding, ContractMgmt, Rfp, RfpTracker, PaymentTagging, Admin };

    const ScreenRouter = ({ state, dispatch }) => {
      const Comp = SCREEN_BY_MODULE[state.activeModule] || Placeholder;
      return html`<${Comp} state=${state} dispatch=${dispatch} />`;
    };

    // ============ TOUR ============
    const placeTooltip = (rect, placement) => {
      const PAD = 14;
      const W = 320;
      const H = 140; // estimate
      let top, left;
      const vw = window.innerWidth, vh = window.innerHeight;
      switch (placement) {
        case 'right':  top = rect.top + rect.height/2 - H/2; left = rect.right + PAD; break;
        case 'left':   top = rect.top + rect.height/2 - H/2; left = rect.left - W - PAD; break;
        case 'top':    top = rect.top - H - PAD; left = rect.left + rect.width/2 - W/2; break;
        case 'bottom': top = rect.bottom + PAD; left = rect.left + rect.width/2 - W/2; break;
        default:       top = rect.top + rect.height/2 - H/2; left = rect.left + rect.width/2 - W/2; break;
      }
      // Auto-flip if off-screen
      if (left < 8) left = 8;
      if (left + W > vw - 8) left = vw - W - 8;
      if (top < 56) top = 56; // below chapter strip
      if (top + H > vh - 8) top = vh - H - 8;
      return { top, left };
    };

    const findTargetRect = async (selector, timeoutMs = 800) => {
      const deadline = Date.now() + timeoutMs;
      while (Date.now() < deadline) {
        const el = document.querySelector(selector);
        if (el) {
          const r = el.getBoundingClientRect();
          if (r.width > 0 && r.height > 0) return { rect: r, el };
        }
        await new Promise(rs => setTimeout(rs, 50));
      }
      return null;
    };

    const TourOverlay = ({ steps, currentStep, dispatch, onAdvance, onPrev, onSkip, onJumpChapter }) => {
      const step = steps[currentStep];
      const [rect, setRect] = useState(null);

      useEffect(() => {
        if (!step) return;
        if (!step.target) { setRect(null); return; }
        let cancelled = false;
        (async () => {
          const found = await findTargetRect(step.target);
          if (!cancelled) setRect(found?.rect ?? null);
        })();
        return () => { cancelled = true; };
      }, [currentStep, step]);

      useEffect(() => {
        if (!step?.target) return;
        const update = () => {
          const el = document.querySelector(step.target);
          if (el) setRect(el.getBoundingClientRect());
        };
        window.addEventListener('resize', update);
        window.addEventListener('scroll', update, true);
        return () => {
          window.removeEventListener('resize', update);
          window.removeEventListener('scroll', update, true);
        };
      }, [step?.target]);

      if (!step) return null;

      const isCenter = !step.target;
      const chapters = useMemo(() => Array.from(new Set(steps.filter(s => s.chapter && s.chapter > 0).map(s => s.chapter))).sort(), [steps]);
      const activeChapter = step.chapter;

      return html`
        <div>
          <div class="tour-chapter-strip">
            ${chapters.map(ch => {
              const firstIdx = steps.findIndex(s => s.chapter === ch);
              const label = (steps.find(s => s.chapter === ch)?.chapterLabel) || ('Ch ' + ch);
              return html`
                <div key=${ch} class=${'ch' + (activeChapter === ch ? ' active' : '')} onClick=${() => onJumpChapter(firstIdx)}>[${ch}] ${label}</div>
              `;
            })}
          </div>
          <div class="tour-backdrop">
            <svg>
              <defs>
                <mask id="tour-cut">
                  <rect x="0" y="0" width="100%" height="100%" fill="white" />
                  ${rect ? html`<rect x=${rect.left - 8} y=${rect.top - 8} width=${rect.width + 16} height=${rect.height + 16} rx="6" ry="6" fill="black" />` : null}
                </mask>
              </defs>
              <rect x="0" y="0" width="100%" height="100%" fill="rgba(8,9,11,0.62)" mask="url(#tour-cut)" />
            </svg>
          </div>
          ${rect ? html`
            <div class="tour-spotlight-ring" style=${{
              position:'fixed',
              top: (rect.top - 8) + 'px',
              left:(rect.left - 8) + 'px',
              width:(rect.width + 16) + 'px',
              height:(rect.height + 16) + 'px',
              border:'1px solid var(--brand)',
              borderRadius:'6px',
              boxShadow:'0 0 0 1px rgba(236,27,46,.3), 0 0 24px rgba(236,27,46,.25)',
              pointerEvents:'none',
              zIndex:101,
            }} />
          ` : null}

          ${isCenter
            ? html`
              <div class="tour-center-card" role="dialog" aria-live="polite">
                <div class="label">Step ${currentStep + 1} of ${steps.length}</div>
                <h5>${step.title}</h5>
                <p dangerouslySetInnerHTML=${{ __html: step.body }}></p>
                <div class="actions" style=${{ justifyContent:'center' }}>
                  <button class="skip" onClick=${onSkip} style=${{ marginRight:'10px' }}>Skip walkthrough</button>
                  ${currentStep > 0 ? html`<button onClick=${onPrev}>← Prev</button>` : null}
                  <button class="primary" onClick=${onAdvance}>${currentStep < steps.length - 1 ? 'Next →' : 'Finish'}</button>
                </div>
              </div>
            `
            : rect ? (() => {
                const pos = placeTooltip(rect, step.placement || 'right');
                return html`
                  <div class="tour-tooltip" role="dialog" aria-live="polite" style=${{ top: pos.top + 'px', left: pos.left + 'px' }}>
                    <div class="label">${step.chapterLabel || ''} · Step ${currentStep + 1} of ${steps.length}</div>
                    <h5>${step.title}</h5>
                    <p dangerouslySetInnerHTML=${{ __html: step.body }}></p>
                    <div class="actions">
                      <button class="skip" onClick=${onSkip} style=${{ marginRight:'10px' }}>Skip walkthrough</button>
                      ${currentStep > 0 ? html`<button onClick=${onPrev}>← Prev</button>` : null}
                      <button class="primary" onClick=${onAdvance}>${currentStep < steps.length - 1 ? 'Next →' : 'Finish'}</button>
                    </div>
                  </div>
                `;
              })()
            : null
          }
        </div>
      `;
    };

    // ============ ROOT ============
    const KEY_TO_MODULE = { F1:'VendorOnboarding', F2:'ContractMgmt', F3:'Rfp', F4:'RfpTracker', F5:'PaymentTagging', F9:'Admin' };

    const TOUR_STEPS = [
      { id:'0',   chapter:0, chapterLabel:'',         target:null,
        title:'',
        body:'Press <kbd>Esc</kbd> to walk through the sample Vendor Management Solution. <kbd>R</kbd> to replay.',
        placement:'center' },

      { id:'1.1', chapter:1, chapterLabel:'Vendor',   target:'.bb-side',
        title:'Five modules + Admin',
        body:'F1–F9 keys jump directly - the source PowerApps\'s <code>vlist</code> tab index, modernized.',
        placement:'right',
        before: ({ dispatch }) => dispatch({ type:'SET_MODULE', module:'VendorOnboarding' }) },

      { id:'1.2', chapter:1, chapterLabel:'Vendor',   target:'.kpi-strip',
        title:'Tabular KPIs',
        body:'Each cell shows the week-over-week delta. Hover any cell to see contributing rows.',
        placement:'bottom' },

      { id:'1.3', chapter:1, chapterLabel:'Vendor',   target:'[data-tour="vendor-register"]',
        title:'Vendor register',
        body:'Click any row to open the form drawer - same New/Edit/View/Delete pattern as PowerApps.',
        placement:'right' },

      { id:'2.1', chapter:2, chapterLabel:'Contract', target:'.bb-nav .item[data-mod="ContractMgmt"]',
        title:'Module switch',
        body:'Sidebar item activates with the red signal bar.',
        placement:'right',
        before: ({ dispatch }) => dispatch({ type:'SET_MODULE', module:'ContractMgmt' }) },

      { id:'2.2', chapter:2, chapterLabel:'Contract', target:'[data-tour="contract-renewals"]',
        title:'Renewals at a glance',
        body:'Contracts within 90 days of expiry, sorted by urgency. Drives renewal workload.',
        placement:'left' },

      { id:'2.3', chapter:2, chapterLabel:'Contract', target:'[data-tour="contract-notes-drawer"]',
        title:'Conversational notes',
        body:'Threaded notes per contract - same thread model as the source app.',
        placement:'left',
        before: ({ dispatch }) => {
          dispatch({ type:'SET_MODULE', module:'ContractMgmt' });
          dispatch({ type:'SELECT_ROW', module:'ContractMgmt', id:'CID000080' });
          dispatch({ type:'OPEN_DRAWER', mode:'notes', rowId:'CID000080' });
        } },

      { id:'3.1', chapter:3, chapterLabel:'RFP',      target:'.bb-nav .item[data-mod="Rfp"]',
        title:'The request side',
        body:'This is what a Requester sees when filing a payment request.',
        placement:'right',
        before: ({ dispatch }) => { dispatch({ type:'CLOSE_DRAWER' }); dispatch({ type:'SET_MODULE', module:'Rfp' }); } },

      { id:'3.2', chapter:3, chapterLabel:'RFP',      target:'[data-tour="rfp-form"]',
        title:'Form fields',
        body:'Amount, currency, payee, IT Capex/Opex flag, justifications. Validations match the PowerApps form rules.',
        placement:'right' },

      { id:'3.3', chapter:3, chapterLabel:'RFP',      target:'[data-tour="rfp-submit"]',
        title:'Submit → pipeline',
        body:'Submitting drops the RFP into stage 1 (ITFA) of the approval pipeline - visualized next.',
        placement:'top' },

      { id:'4.1', chapter:4, chapterLabel:'Tracker',  target:'[data-tour="approval-chain"]',
        title:'8-stage approval chain',
        body:'ITFA → ITFUH → BMH → GH → SH → BPROD → CFO → President. Stages light up in signal red as RFPs progress.',
        placement:'bottom',
        before: ({ dispatch }) => dispatch({ type:'SET_MODULE', module:'RfpTracker' }) },

      { id:'4.2', chapter:4, chapterLabel:'Tracker',  target:'[data-tour="chain-stage-ITFA"]',
        title:'Stage filtering',
        body:'Click a stage to filter the queue. Approvers only see what\'s in their stage and what\'s blocked.',
        placement:'bottom',
        before: ({ dispatch }) => dispatch({ type:'SET_TRACKER_STAGE', stage:'ITFA' }) },

      { id:'4.3', chapter:4, chapterLabel:'Tracker',  target:'[data-tour="approve-reject"]',
        title:'Approve / Reject',
        body:'Approve forwards to the next stage. Reject can route to any prior approver - drives the rework loop.',
        placement:'top',
        before: ({ dispatch, state }) => {
          const target = allRfps(state.rfpOverrides).find(r => r.currentStage === 'ITFA');
          if (target) dispatch({ type:'SELECT_ROW', module:'RfpTracker', id: target.id });
        } },

      { id:'5.1', chapter:5, chapterLabel:'Payment',  target:'[data-tour="payment-queue"]',
        title:'Disbursement queue',
        body:'Once President-approved, RFPs land here for treasury to tag against actual disbursements.',
        placement:'top',
        before: ({ dispatch }) => dispatch({ type:'SET_MODULE', module:'PaymentTagging' }) },

      { id:'5.2', chapter:5, chapterLabel:'Payment',  target:'[data-tour="tag-modal"]',
        title:'Closing the audit loop',
        body:'Tagging links the payment to bank reference, exchange rate used, and actual amount paid.',
        placement:'left',
        before: ({ dispatch }) => {
          const first = PAYMENTS.find(p => p.status === 'pending_tag');
          if (first) {
            dispatch({ type:'SELECT_ROW', module:'PaymentTagging', id: first.id });
            dispatch({ type:'OPEN_DRAWER', mode:'tag', rowId: first.id });
          }
        } },

      { id:'6.1', chapter:6, chapterLabel:'Admin',    target:'.bb-nav .item[data-mod="Admin"]',
        title:'Role assignment',
        body:'Determines which modules each user can access (No Access / Read / Edit).',
        placement:'right',
        before: ({ dispatch }) => { dispatch({ type:'CLOSE_DRAWER' }); dispatch({ type:'SET_MODULE', module:'Admin' }); } },

      { id:'6.2', chapter:6, chapterLabel:'Admin',    target:'[data-tour="role-matrix"]',
        title:'Permission matrix',
        body:'Rows are users, columns are modules - same data shape as the RoleAccess SharePoint list.',
        placement:'top' },

      { id:'7',   chapter:0, chapterLabel:'Closing',  target:null,
        title:'End of walkthrough',
        body:'Press <kbd>Esc</kbd> to free-click, or <kbd>R</kbd> to replay.',
        placement:'center' },
    ];

    const App = () => {
      const [state, dispatch] = useReducer(appReducer, initialAppState);
      const urlTour = new URLSearchParams(location.search).get('tour');
      const autoStart = urlTour !== '0';
      const [tourActive, setTourActive] = useState(autoStart);
      const [currentStep, setCurrentStep] = useState(urlTour && urlTour !== '0' ? Number(urlTour) || 0 : 0);
      const [lastStep, setLastStep] = useState(null);

      useEffect(() => {
        const onKey = (e) => {
          if (KEY_TO_MODULE[e.key]) {
            e.preventDefault();
            dispatch({ type: 'SET_MODULE', module: KEY_TO_MODULE[e.key] });
            return;
          }
          if (!tourActive) {
            if (e.key === 'r' || e.key === 'R') { setCurrentStep(0); setTourActive(true); }
            return;
          }
          if (e.key === 'Escape') { setLastStep(currentStep); setTourActive(false); }
          else if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); advance(); }
          else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
          else if (e.key === 'r' || e.key === 'R') { setCurrentStep(0); }
          else if (e.key >= '1' && e.key <= '6') {
            const ch = Number(e.key);
            const idx = TOUR_STEPS.findIndex(s => s.chapter === ch);
            if (idx >= 0) jumpToStep(idx);
          }
        };

        const onJumpEvent = (e) => {
          const idx = e.detail?.step ?? 0;
          jumpToStep(idx);
          if (!tourActive) setTourActive(true);
        };

        window.addEventListener('keydown', onKey);
        window.addEventListener('demo-tour-jump', onJumpEvent);
        return () => {
          window.removeEventListener('keydown', onKey);
          window.removeEventListener('demo-tour-jump', onJumpEvent);
        };
      }, [tourActive, currentStep, state]);

      const jumpToStep = (idx) => {
        // Replay all `before` callbacks for steps 0..idx in order
        for (let i = 0; i <= idx; i++) {
          const s = TOUR_STEPS[i];
          if (s.before) s.before({ dispatch, state });
        }
        setCurrentStep(idx);
      };

      const advance = () => {
        const next = currentStep + 1;
        if (next >= TOUR_STEPS.length) { setTourActive(false); setLastStep(null); return; }
        const s = TOUR_STEPS[next];
        if (s.before) s.before({ dispatch, state });
        setCurrentStep(next);
      };
      const prev = () => {
        if (currentStep === 0) return;
        setCurrentStep(currentStep - 1);
      };
      const skip = () => { setLastStep(currentStep); setTourActive(false); };

      return html`
        <div class="bb-shell" data-app-ready="true">
          <${Sidebar} active=${state.activeModule} onSelect=${(m) => dispatch({ type:'SET_MODULE', module: m })} />
          <div class="bb-main">
            <${Topbar} activeModule=${state.activeModule} />
            <div class="bb-screen">
              <${ScreenRouter} state=${state} dispatch=${dispatch} />
            </div>
            <${CommandBar} />
          </div>
          ${tourActive ? html`
            <${TourOverlay} steps=${TOUR_STEPS} currentStep=${currentStep} dispatch=${dispatch}
                            onAdvance=${advance} onPrev=${prev} onSkip=${skip} onJumpChapter=${jumpToStep} />
          ` : null}
          ${!tourActive && lastStep !== null ? html`
            <div style=${{ position:'fixed', bottom:'16px', right:'16px', zIndex:50, background:'var(--canvas-deep)', border:'1px solid var(--brand)', borderRadius:'20px', padding:'8px 14px', font:'500 11.5px IBM Plex Mono, monospace', color:'var(--brand)', cursor:'pointer' }}
                 onClick=${() => { setCurrentStep(lastStep); setTourActive(true); }}>
              ▶ Resume tour (step ${lastStep + 1} of ${TOUR_STEPS.length})
            </div>
          ` : null}
        </div>
      `;
    };

    createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
